name: QA-Pilot CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests (29 tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install only what tests need
        run: |
          pip install --upgrade pip
          pip install \
            pytest==8.2.0 \
            pytest-mock==3.14.0 \
            python-decouple==3.8 \
            django==5.0.4 \
            djangorestframework==3.15.1 \
            djangorestframework-simplejwt==5.3.1 \
            django-cors-headers==4.3.1 \
            django-filter==24.2 \
            structlog==24.1.0 \
            dj-database-url==2.1.0 \
            whitenoise==6.6.0 \
            beautifulsoup4==4.12.3 \
            fake-useragent==1.5.1 \
            requests==2.31.0 \
            pandas==2.2.2 \
            celery==5.4.0 \
            redis==5.0.4

      - name: Create .env
        run: |
          echo "DJANGO_SECRET_KEY=ci-test-secret-key" > .env
          echo "GEMINI_API_KEY=dummy-not-needed-for-unit-tests" >> .env
          echo "GEMINI_MODEL=gemini-2.0-flash" >> .env
          echo "SCRAPER_HEADLESS=True" >> .env
          echo "SCRAPER_TIMEOUT=30" >> .env
          echo "SCRAPER_MAX_RETRIES=3" >> .env
          echo "SCRAPER_DELAY_MIN=1" >> .env
          echo "SCRAPER_DELAY_MAX=3" >> .env
          echo "JWT_ACCESS_TOKEN_LIFETIME_MINUTES=60" >> .env
          echo "JWT_REFRESH_TOKEN_LIFETIME_DAYS=7" >> .env

      - name: Run unit tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.ci
        run: pytest tests/unit/ -v --tb=short

      - name: Print summary
        if: always()
        run: echo "✅ QA-Pilot unit tests complete"