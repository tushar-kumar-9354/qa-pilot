[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development

; [pytest]
; DJANGO_SETTINGS_MODULE = config.settings.local

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests — fast, no external dependencies, mock everything
    integration: Integration tests — tests DB + API pipelines together
    e2e: End-to-end Selenium browser tests
    api: FastAPI endpoint tests with TestClient
    performance: Locust load tests

addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -p no:cacheprovider

asyncio_mode = auto

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
