name: QA-Pilot CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.development
  DATABASE_URL: postgresql://qa_pilot_user:testpass@localhost:5432/qa_pilot_test
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/1
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DJANGO_DEBUG: "True"
  GEMINI_API_KEY: ${{ secrets.AIzaSyBHt9KT_-ZMZ3yAYcvOiykVREwjNngHofA }}
  POSTGRES_DB: qa_pilot_test
  POSTGRES_USER: qa_pilot_user
  POSTGRES_PASSWORD: testpass
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"

jobs:

  # ── 1. Code Quality ─────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting deps
        run: pip install black flake8 isort

      - name: Check formatting (black)
        run: black --check apps/ config/ fastapi_app/ tests/

      - name: Check imports (isort)
        run: isort --check-only apps/ config/ fastapi_app/ tests/

      - name: Lint (flake8)
        run: flake8 apps/ config/ fastapi_app/ --max-line-length=100 --exclude=migrations

  # ── 2. Unit Tests ────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v -m unit --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── 3. Integration Tests ─────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qa_pilot_test
          POSTGRES_USER: qa_pilot_user
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration

  # ── 4. API Tests ─────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: qa_pilot_test
          POSTGRES_USER: qa_pilot_user
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run API tests
        run: pytest tests/api/ -v -m api

  # ── 5. Build Docker Image ────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-tests, api-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Django image
        run: docker build -f docker/Dockerfile.django -t qa-pilot-django:${{ github.sha }} .

      - name: Build FastAPI image
        run: docker build -f docker/Dockerfile.fastapi -t qa-pilot-fastapi:${{ github.sha }} .

  # ── 6. Deploy (main branch only) ────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "Deploying QA-Pilot to Render..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "Deploy hook not configured"
